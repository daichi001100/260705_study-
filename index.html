<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メェだい院試トラッカー｜名大 理学部 生命科学</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb:#16162E;--sb-t:rgba(255,255,255,.5);--sb-th:rgba(255,255,255,.8);--sb-ta:#fff;
  --sb-ah:rgba(255,255,255,.07);--sb-aa:rgba(255,255,255,.12);--sb-bd:rgba(255,255,255,.08);
  --bg:#F5F6FB;--card:#fff;--bd:#EAEAF0;
  --tx:#1A1A3E;--tx2:#6B6B8D;--tx3:#A8A8C0;
  --ac:#7B70F5;--ac2:#9B96F8;--acb:#F0EFFE;
  --hi:#EF5656;--hib:#FEF0F0;--me:#F59E35;--meb:#FFF8EE;--lo:#3FCA72;--lob:#EDFAF3;
  /* subject colors */
  --org:#7B70F5;--orgb:#F0EFFE;   /* 有機 purple */
  --inorg:#3FA9F5;--inorgb:#EAF5FE;/* 無機 blue */
  --phys:#F5853F;--physb:#FFF3EA;  /* 物化 orange */
  --bio:#22B07A;--biob:#E7F7F0;    /* 生化 green */
  --gold:#F2B01E;--goldb:#FFF6E0;  /* 金のりんご */
  --r:14px;--sh:0 2px 8px rgba(26,26,62,.08);--shl:0 8px 24px rgba(26,26,62,.12);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:var(--bg);color:var(--tx);height:100vh;display:flex;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px}
a{text-decoration:none;color:inherit}

/* ===== SIDEBAR ===== */
#sidebar{width:236px;min-width:236px;background:var(--sb);display:flex;flex-direction:column;overflow-y:auto}
.sb-logo{display:flex;align-items:center;gap:10px;padding:22px 20px 18px}
.sb-mark{width:34px;height:34px;flex-shrink:0}
.sb-name{font-size:14px;font-weight:800;color:#fff;letter-spacing:1px;line-height:1.2}
.sb-name small{display:block;font-size:9px;font-weight:600;color:rgba(255,255,255,.4);letter-spacing:.5px}
.sb-nav{padding:0 12px 4px}
.sb-cap{font-size:10px;font-weight:700;color:rgba(255,255,255,.28);letter-spacing:1px;text-transform:uppercase;padding:14px 12px 6px}
.sb-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:var(--sb-t);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:1px}
.sb-item:hover{background:var(--sb-ah);color:var(--sb-th)}
.sb-item.active{background:var(--sb-aa);color:var(--sb-ta)}
.sb-icon{width:18px;height:18px;flex-shrink:0;opacity:.7}
.sb-item.active .sb-icon{opacity:1}
.sb-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin:0 4px}
.sb-badge{margin-left:auto;background:rgba(255,255,255,.12);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px}
/* mini meidai in sidebar */
.sb-meidai{margin:auto 14px 14px;border-radius:16px;background:linear-gradient(150deg,#2B2570,#4A3F9B);padding:16px;text-align:center;position:relative;overflow:hidden}
.sb-meidai::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% 20%,rgba(255,255,255,.06),transparent 60%)}
.sb-meidai svg{width:74px;height:74px;position:relative}
.sb-meidai-name{font-size:13px;font-weight:800;color:#fff;margin-top:4px}
.sb-meidai-lv{font-size:10.5px;color:rgba(255,255,255,.55);margin-top:1px}
.sb-xp{height:6px;background:rgba(255,255,255,.15);border-radius:99px;margin-top:9px;overflow:hidden}
.sb-xp i{display:block;height:100%;background:linear-gradient(90deg,#FFD66B,#FF9D5C);border-radius:99px;transition:width .6s}
.sb-user{display:flex;align-items:center;gap:10px;padding:12px 16px 16px;border-top:1px solid var(--sb-bd);cursor:default}
.sb-avatar{width:34px;height:34px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0}
.sb-uname{font-size:12.5px;font-weight:600;color:rgba(255,255,255,.85)}
.sb-uemail{font-size:11px;color:rgba(255,255,255,.38)}
.sb-user:hover{background:var(--sb-ah)}

/* ===== ACCOUNT GATE ===== */
#gate{position:fixed;inset:0;z-index:500;background:linear-gradient(150deg,#16162E,#2B2570 60%,#4A3F9B);display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
#gate.hidden{display:none}
.gate-card{background:var(--card);border-radius:22px;width:420px;max-width:100%;padding:30px 28px;box-shadow:0 24px 70px rgba(0,0,0,.4);animation:su .25s ease}
.gate-logo{width:76px;height:76px;margin:0 auto 6px}
.gate-logo svg{width:100%;height:100%;display:block}
.gate-title{font-size:20px;font-weight:800;text-align:center;color:var(--tx)}
.gate-sub{font-size:12.5px;color:var(--tx2);text-align:center;margin:6px 0 18px;line-height:1.6}
.gate-accts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.gate-cap{font-size:10.5px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.gate-acct{display:flex;align-items:center;gap:11px;padding:10px 12px;border:1.5px solid var(--bd);border-radius:12px;cursor:pointer;transition:all .12s}
.gate-acct:hover{border-color:var(--ac);background:var(--acb)}
.gate-acct .ga-av{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gate-acct .ga-nm{font-size:14px;font-weight:700;flex:1}
.gate-acct .ga-meta{font-size:10.5px;color:var(--tx3)}
.gate-acct.cur{border-color:var(--ac);background:var(--acb)}
.ga-del{width:26px;height:26px;border:none;background:var(--bg);border-radius:7px;color:var(--tx3);cursor:pointer;font-size:13px;flex-shrink:0}
.ga-del:hover{background:var(--hib);color:var(--hi)}
.gate-or{text-align:center;font-size:11px;color:var(--tx3);margin:4px 0 12px}
.gate-form{display:flex;gap:8px}
.gate-input{flex:1;padding:11px 14px;border:1.8px solid var(--bd);border-radius:12px;font-size:14px;font-family:inherit;outline:none;color:var(--tx)}
.gate-input:focus{border-color:var(--ac)}
.gate-cancel{display:block;margin:14px auto 0;background:none;border:none;color:var(--tx3);font-size:12.5px;cursor:pointer;font-family:inherit;text-decoration:underline}
.gate-cancel:hover{color:var(--tx2)}

/* ===== ひみつの祝福（1日の勉強時間で発動） ===== */
#cheer{position:fixed;inset:0;z-index:600;overflow:hidden}
#cheer.hidden{display:none}
.cheer-scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;cursor:pointer;animation:fi .3s}
.cheer-scene.praise{background:radial-gradient(circle at 50% 40%,#2B2570,#08081A)}
.cheer-scene.festival{background:radial-gradient(circle at 50% 46%,#961A1A,#180620)}
.sensei.big{width:min(44vw,320px)}
.sensei.big svg{width:100%;height:auto;display:block;filter:drop-shadow(0 14px 34px rgba(0,0,0,.55))}
.sensei.pop{animation:senseiPop .7s cubic-bezier(.2,1.4,.4,1)}
@keyframes senseiPop{0%{transform:scale(.2) translateY(60px);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.cheer-title{font-size:clamp(24px,5.5vw,50px);font-weight:900;color:#FFD66B;text-shadow:0 3px 0 #B4472A,0 6px 16px rgba(0,0,0,.4);margin-bottom:8px;animation:senseiPop .6s ease}
.cheer-bubble{margin-top:18px;background:#fff;color:#1A1A3E;font-weight:800;font-size:clamp(15px,2.5vw,23px);line-height:1.55;padding:16px 28px;border-radius:20px;position:relative;max-width:82vw;box-shadow:0 10px 34px rgba(0,0,0,.35);animation:fi .5s .2s both}
.cheer-bubble::after{content:'';position:absolute;top:-15px;left:50%;transform:translateX(-50%);border:9px solid transparent;border-bottom-color:#fff}
.cheer-x{margin-top:24px;background:#fff;color:#2B2570;border:none;border-radius:13px;padding:13px 34px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 6px 18px rgba(0,0,0,.3)}
.cheer-x:hover{background:#f0f0f7}
.dancers{position:absolute;bottom:3%;left:0;right:0;height:130px;pointer-events:none}
.dancer{position:absolute;bottom:0;width:clamp(46px,6vw,70px);transform-origin:bottom center;animation:dance .7s ease-in-out infinite}
.dancer svg{width:100%;height:auto;filter:drop-shadow(0 4px 6px rgba(0,0,0,.3))}
@keyframes dance{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-18px) rotate(8deg)}}
.lanterns{position:absolute;top:0;left:0;right:0;height:70px;pointer-events:none}
.lantern{position:absolute;top:-6px;width:clamp(26px,4vw,38px);aspect-ratio:.78;border-radius:50%/46%;background:linear-gradient(#F0574A,#C42B23);border-top:4px solid #F4B324;border-bottom:4px solid #F4B324;box-shadow:inset -4px 0 8px rgba(0,0,0,.25);transform-origin:top center;animation:swing 2.4s ease-in-out infinite}
.lantern::before{content:'';position:absolute;left:22%;right:22%;top:6px;bottom:6px;border-left:2px solid rgba(0,0,0,.14);border-right:2px solid rgba(0,0,0,.14)}
@keyframes swing{0%,100%{transform:rotate(-11deg)}50%{transform:rotate(11deg)}}
.sparkle{position:absolute;font-size:clamp(24px,4vw,40px);animation:twinkle 1.4s ease-in-out infinite}
.sparkle.s1{top:16%;left:22%}.sparkle.s2{top:22%;right:20%;animation-delay:.3s}.sparkle.s3{bottom:26%;left:26%;animation-delay:.6s}.sparkle.s4{bottom:20%;right:24%;animation-delay:.9s}
@keyframes twinkle{0%,100%{transform:scale(.7);opacity:.5}50%{transform:scale(1.2);opacity:1}}

/* ===== MAIN ===== */
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.main-hd{display:flex;align-items:flex-start;justify-content:space-between;padding:28px 32px 0;gap:20px}
.greeting{font-size:25px;font-weight:700;margin-bottom:4px}
.greeting-sub{font-size:13px;color:var(--tx2)}
.countbox{display:flex;align-items:center;gap:14px;background:var(--card);border:1.5px solid var(--bd);border-radius:14px;padding:12px 18px;box-shadow:var(--sh);flex-shrink:0}
.countbox .cd-num{font-size:30px;font-weight:800;color:var(--hi);line-height:1}
.countbox .cd-lbl{font-size:11px;color:var(--tx2);font-weight:600}
.countbox .cd-date{font-size:11px;color:var(--tx3)}
.countbox input{border:1px solid var(--bd);border-radius:7px;font-size:11px;padding:2px 5px;color:var(--tx);font-family:inherit;width:122px}

.view-pad{padding:22px 32px 30px;flex:1}
.sec-hd{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;margin:26px 0 12px}
.sec-hd:first-child{margin-top:0}
.sec-hd .pill{font-size:11px;font-weight:600;color:var(--tx2);background:var(--bg);border:1px solid var(--bd);padding:2px 9px;border-radius:99px}

/* stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:6px}
.stat-card{background:var(--card);border:1.5px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh)}
.stat-card .sc-lbl{font-size:11.5px;color:var(--tx3);margin-bottom:7px}
.stat-card .sc-val{font-size:26px;font-weight:800;line-height:1}
.stat-card .sc-sub{font-size:11px;color:var(--tx2);margin-top:6px}
.stat-card .sc-ico{font-size:20px;float:right}

/* hero meidai */
.hero{display:grid;grid-template-columns:300px 1fr;gap:18px;margin-bottom:8px}
.meidai-card{background:linear-gradient(160deg,#2B2570,#4A3F9B 60%,#6A4FB0);border-radius:18px;padding:22px;color:#fff;position:relative;overflow:hidden;text-align:center}
.meidai-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 10%,rgba(255,255,255,.1),transparent 55%),radial-gradient(circle at 10% 90%,rgba(255,255,255,.06),transparent 50%)}
.meidai-stage-name{font-size:11px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.6);text-transform:uppercase;position:relative}
.meidai-stage{position:relative;width:170px;height:170px;margin:6px auto 4px}
.meidai-stage svg{width:100%;height:100%;filter:drop-shadow(0 8px 14px rgba(0,0,0,.25))}
.meidai-name{font-size:20px;font-weight:800;position:relative}
.meidai-lv{font-size:12px;color:rgba(255,255,255,.65);position:relative;margin-top:2px}
.meidai-xpbar{height:9px;background:rgba(255,255,255,.16);border-radius:99px;margin:12px 0 5px;overflow:hidden;position:relative}
.meidai-xpbar i{display:block;height:100%;background:linear-gradient(90deg,#FFD66B,#FF9D5C);border-radius:99px;transition:width .6s}
.meidai-xptxt{font-size:10.5px;color:rgba(255,255,255,.6);position:relative}
.meidai-msg{font-size:11.5px;color:rgba(255,255,255,.85);margin-top:12px;background:rgba(255,255,255,.1);border-radius:10px;padding:8px 12px;position:relative;line-height:1.5}

.side-panel{display:flex;flex-direction:column;gap:14px}
/* subject progress rows */
.subj-prog{background:var(--card);border:1.5px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh)}
.sp-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd)}
.sp-row:last-child{border-bottom:none}
.sp-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.sp-name{font-size:13.5px;font-weight:700}
.sp-meta{font-size:11px;color:var(--tx2);margin-top:1px}
.sp-bar{flex:1;height:8px;background:var(--bg);border-radius:99px;overflow:hidden;margin:0 4px}
.sp-bar i{display:block;height:100%;border-radius:99px;transition:width .5s}
.sp-pct{font-size:13px;font-weight:800;width:42px;text-align:right}

/* week / topic cards */
.week-block{margin-bottom:22px}
.week-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.week-num{font-size:13px;font-weight:800;background:var(--tx);color:#fff;border-radius:8px;padding:4px 10px}
.week-num.cur{background:var(--ac)}
.week-title{font-size:14px;font-weight:700}
.week-due{font-size:11.5px;color:var(--tx2)}
.week-prog{margin-left:auto;font-size:11.5px;font-weight:700;color:var(--tx2)}
.week-prog.done{color:var(--lo)}
.topic-row{background:var(--card);border:1.5px solid var(--bd);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh);overflow:hidden;transition:border-color .15s}
.topic-row:hover{border-color:#dcdcec}
.topic-hd{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer}
.topic-tag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:7px;flex-shrink:0}
.topic-title{font-size:13.5px;font-weight:600;flex:1;min-width:0}
.topic-due{font-size:11.5px;color:var(--tx2);display:flex;align-items:center;gap:5px;white-space:nowrap}
.topic-due.over{color:var(--hi);font-weight:600}
.topic-pct{font-size:11.5px;font-weight:700;color:var(--tx2);width:42px;text-align:right}
.topic-chev{width:18px;height:18px;color:var(--tx3);transition:transform .2s;flex-shrink:0}
.topic-row.open .topic-chev{transform:rotate(90deg)}
.mini-bar{height:4px;background:var(--bg)}
.mini-bar i{display:block;height:100%;transition:width .4s}
.topic-body{display:none;padding:6px 16px 14px;border-top:1px solid var(--bd)}
.topic-row.open .topic-body{display:block}
.chk{display:flex;align-items:center;gap:11px;padding:8px 4px;cursor:pointer;border-radius:8px}
.chk:hover{background:var(--bg)}
.chk-box{width:20px;height:20px;border:2px solid var(--bd);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk:hover .chk-box{border-color:var(--ac)}
.chk.on .chk-box{background:var(--ac);border-color:var(--ac)}
.chk.on .chk-box svg{width:12px;height:12px;color:#fff}
.chk-lbl{font-size:13px;color:var(--tx)}
.chk.on .chk-lbl{text-decoration:line-through;color:var(--tx3)}

/* evolution strip */
.evo-strip{display:flex;gap:10px;overflow-x:auto;padding:4px 0 8px}
.evo-card{flex:0 0 auto;width:130px;background:var(--card);border:1.5px solid var(--bd);border-radius:var(--r);padding:14px 10px;text-align:center;box-shadow:var(--sh);opacity:.5;transition:all .2s}
.evo-card.unlocked{opacity:1}
.evo-card.current{border-color:var(--ac);border-width:2.5px;background:var(--acb)}
.evo-card svg{width:78px;height:78px}
.evo-locked-emoji{font-size:42px;line-height:78px}
.evo-name{font-size:12.5px;font-weight:800;margin-top:4px}
.evo-cond{font-size:10.5px;color:var(--tx2);margin-top:3px;line-height:1.4}
.evo-badge{font-size:9.5px;font-weight:700;color:var(--lo);margin-top:5px}

/* past exam grid */
.exam-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.exam-card{background:var(--card);border:1.5px solid var(--bd);border-radius:var(--r);padding:15px 16px;box-shadow:var(--sh);transition:all .15s}
.exam-card:hover{border-color:var(--ac);box-shadow:var(--shl);transform:translateY(-2px)}
.exam-yr{font-size:16px;font-weight:800}
.exam-sub{font-size:11px;color:var(--tx2);margin:2px 0 10px}
.exam-links{display:flex;flex-direction:column;gap:6px}
.exam-link{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--ac);padding:6px 9px;background:var(--acb);border-radius:8px}
.exam-link:hover{background:#e6e3fd}
.exam-link svg{width:14px;height:14px}

.note{font-size:12px;color:var(--tx2);background:var(--card);border:1.5px dashed var(--bd);border-radius:var(--r);padding:14px 16px;line-height:1.7}

/* ===== QUIZ ===== */
.quiz-banner{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#2B2570,#5A3FA0);border-radius:var(--r);padding:18px 22px;color:#fff;margin-bottom:20px}
.quiz-banner .qb-ico{font-size:30px}
.quiz-banner .qb-t{font-size:16px;font-weight:800}
.quiz-banner .qb-s{font-size:12px;color:rgba(255,255,255,.7);margin-top:2px}
.quiz-banner .qb-streak{margin-left:auto;text-align:center;background:rgba(255,255,255,.12);border-radius:12px;padding:8px 16px}
.quiz-banner .qb-streak b{font-size:22px;font-weight:800;display:block}
.quiz-banner .qb-streak span{font-size:10.5px;color:rgba(255,255,255,.7)}
.qcard{background:var(--card);border:1.5px solid var(--bd);border-radius:var(--r);padding:18px 20px;margin-bottom:14px;box-shadow:var(--sh)}
.qcard-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.qnum{width:26px;height:26px;border-radius:8px;background:var(--tx);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qtag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:7px}
.qtext{font-size:14.5px;font-weight:600;line-height:1.6;margin-bottom:14px}
.qopts{display:flex;flex-direction:column;gap:8px}
.qopt{display:flex;align-items:center;gap:11px;padding:11px 14px;border:1.8px solid var(--bd);border-radius:11px;cursor:pointer;font-size:13.5px;transition:all .12s}
.qopt:hover{border-color:var(--ac);background:var(--bg)}
.qopt .qo-key{width:24px;height:24px;border-radius:7px;background:var(--bg);font-size:12px;font-weight:800;color:var(--tx2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qopt.sel{border-color:var(--ac);background:var(--acb)}
.qopt.sel .qo-key{background:var(--ac);color:#fff}
.qopt.correct{border-color:var(--lo);background:var(--lob)}
.qopt.correct .qo-key{background:var(--lo);color:#fff}
.qopt.wrong{border-color:var(--hi);background:var(--hib)}
.qopt.wrong .qo-key{background:var(--hi);color:#fff}
.qexp{margin-top:12px;font-size:12.5px;color:var(--tx2);background:var(--bg);border-radius:10px;padding:11px 14px;line-height:1.7;display:none}
.qexp.show{display:block}
.qexp b{color:var(--tx)}
.qsubmit{display:flex;align-items:center;gap:14px;margin-top:6px}
.btn-p{background:var(--ac);color:#fff}.btn-p:hover{background:#6960E0}
.btn-p:disabled{opacity:.45;cursor:not-allowed}
.qresult{font-size:14px;font-weight:700}
.qdone-card{background:linear-gradient(135deg,#EDFAF3,#fff);border:2px solid var(--lo);border-radius:var(--r);padding:22px;text-align:center;margin-bottom:16px}
.qdone-card .qd-t{font-size:18px;font-weight:800;color:var(--lo)}
.qdone-card .qd-s{font-size:13px;color:var(--tx2);margin-top:4px}

/* exam checklist additions */
.exam-card .ex-prog{height:6px;background:var(--bg);border-radius:99px;overflow:hidden;margin:10px 0}
.exam-card .ex-prog i{display:block;height:100%;background:var(--ac);border-radius:99px;transition:width .4s}
.exam-chk{display:flex;align-items:center;gap:9px;padding:6px 2px;cursor:pointer;font-size:12.5px;border-radius:7px}
.exam-chk:hover{background:var(--bg)}
.exam-chk .ec-box{width:18px;height:18px;border:2px solid var(--bd);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.exam-chk.on .ec-box{background:var(--ac);border-color:var(--ac)}
.exam-chk.on .ec-box svg{width:11px;height:11px;color:#fff}
.exam-chk.on{color:var(--tx3);text-decoration:line-through}
.exam-yearfull{font-size:10.5px;font-weight:700;color:var(--lo);margin-top:6px}

/* ===== STUDY / HOUSE ===== */
.study-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.chip{padding:8px 14px;border:1.8px solid var(--bd);border-radius:10px;background:var(--card);font-size:13px;font-weight:700;color:var(--bio);cursor:pointer;font-family:inherit;transition:all .12s}
.chip:hover{background:var(--biob);border-color:var(--bio)}
.study-row{display:flex;gap:8px;align-items:center}
.fi2{flex:1;padding:9px 12px;border:1.8px solid var(--bd);border-radius:10px;font-size:13.5px;font-family:inherit;outline:none;color:var(--tx)}
.fi2:focus{border-color:var(--bio)}
.study-note{font-size:11px;color:var(--tx3);margin-top:9px}
.wk-bars{display:flex;align-items:flex-end;gap:8px;height:96px}
.wk-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.wk-track{width:100%;flex:1;background:var(--bg);border-radius:6px;display:flex;align-items:flex-end;overflow:hidden}
.wk-track i{width:100%;border-radius:6px;min-height:3px;transition:height .4s}
.wk-lbl{font-size:10.5px;color:var(--tx3);font-weight:700}
.wk-lbl.on{color:var(--bio)}
.wk-min{font-size:9.5px;color:var(--tx3);height:11px}
.th-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
.th-item{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--bd);border-radius:11px;padding:11px 14px;box-shadow:var(--sh);opacity:.6}
.th-item.on{opacity:1;border-color:var(--gold);background:var(--goldb)}
.th-h{font-size:15px;font-weight:800;color:var(--tx2);min-width:42px}
.th-item.on .th-h{color:var(--goldSh,#D8960E)}
.th-nm{font-size:12px;font-weight:600;flex:1}
.th-ok{color:var(--lo);font-weight:800}
.house-big{background:var(--card);border:1.5px solid var(--bd);border-radius:var(--r);padding:10px;box-shadow:var(--sh);max-width:520px;margin-bottom:8px}
.house-big svg{width:100%;height:auto;display:block}
.house-mini svg{width:100%!important;height:auto!important;display:block}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A3E;color:#fff;padding:12px 20px;border-radius:14px;font-size:13.5px;font-weight:600;z-index:300;box-shadow:0 8px 30px rgba(0,0,0,.3);transition:opacity .3s,transform .3s;display:flex;align-items:center;gap:10px}
#toast.hidden{opacity:0;transform:translateX(-50%) translateY(12px);pointer-events:none}
#toast svg{width:22px;height:22px}

/* level up overlay */
#evoOverlay{position:fixed;inset:0;background:rgba(22,22,46,.7);display:flex;align-items:center;justify-content:center;z-index:400;backdrop-filter:blur(4px);animation:fi .25s}
#evoOverlay.hidden{display:none}
@keyframes fi{from{opacity:0}}
@keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1)}}
.evo-modal{background:linear-gradient(160deg,#2B2570,#5A3FA0);border-radius:24px;padding:34px 40px;text-align:center;color:#fff;box-shadow:0 30px 80px rgba(0,0,0,.5);animation:pop .5s ease;max-width:360px}
.evo-modal .em-lbl{font-size:13px;font-weight:700;letter-spacing:2px;color:#FFD66B}
.evo-modal .em-svg{width:160px;height:160px;margin:10px auto}
.evo-modal .em-svg svg{width:100%;height:100%;filter:drop-shadow(0 10px 20px rgba(0,0,0,.3))}
.evo-modal .em-name{font-size:24px;font-weight:800;margin-top:6px}
.evo-modal .em-msg{font-size:13px;color:rgba(255,255,255,.85);margin:10px 0 20px;line-height:1.6}
.evo-modal button{background:#fff;color:#2B2570;border:none;border-radius:12px;padding:11px 30px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.evo-modal button:hover{background:#f0f0f5}
.confetti{position:fixed;width:10px;height:14px;top:-20px;z-index:401;pointer-events:none;border-radius:2px}

.btn{padding:8px 16px;border-radius:9px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-s{background:var(--card);color:var(--tx2);border:1.5px solid var(--bd)}.btn-s:hover{background:var(--bg)}
</style>
</head>

const SUBJECTS = {

};
const WEEK_TITLES = {
  1:'基礎固め',2:'結合と立体',3:'反応の原理',4:'反応と構造',
  5:'発展トピック I',6:'発展トピック II',7:'統合・応用',8:'総仕上げ・過去問'
};
/* 到達度＝各教科書の「章」。items は教科書の章タイトル。 */
const TOPICS = [
  /* ===== WEEK 1 ===== */
  {id:'o1', subj:'organic', week:1, title:'構造・結合・酸塩基（ボルハルト 1〜3章）', items:['1章 有機分子の構造と結合','2章 単結合の構造と反応性（酸・塩基）','3章 アルカンの反応：結合解離エネルギーとラジカルハロゲン化']},

  {id:'p1', subj:'physical', week:1, title:'熱力学第一法則（アトキンス）', items:['状態量・仕事と熱・内部エネルギー','エンタルピーと熱化学','熱容量(Cp,Cv)・Hessの法則']},
  {id:'b1', subj:'biochem', week:1, title:'水・アミノ酸・タンパク質構造（ヴォート 1〜6章）', items:['生命の化学・水とpH・緩衝液','アミノ酸とタンパク質の一次構造','タンパク質の高次構造（二次〜四次）']},

  /* ===== WEEK 2 ===== */
  {id:'o2', subj:'organic', week:2, title:'環と立体化学（ボルハルト 4〜5章）', items:['4章 シクロアルカン（配座・ひずみ）','5章 立体異性体（キラリティー・R/S）','Fischer/Newman 投影式']},
  {id:'i2', subj:'inorganic', week:2, title:'化学結合（ハウスクロフト 結合論）', items:['ルイス構造とVSEPR','原子価結合法（VB）・混成','分子軌道法（二原子分子・結合次数）']},
  {id:'p2', subj:'physical', week:2, title:'熱力学第二・第三法則（アトキンス）', items:['エントロピーとカルノーサイクル','Gibbs/Helmholtz 自由エネルギー','化学ポテンシャル・第三法則']},

  {id:'o3', subj:'organic', week:3, title:'求核置換・脱離（ボルハルト 6〜7章）', items:['6章 ハロアルカンの求核置換（SN1/SN2）','7章 脱離反応（E1/E2）と置換との競合','カルボカチオンと転位']},
  {id:'i3', subj:'inorganic', week:3, title:'対称性と群論（ハウスクロフト）', items:['対称要素と対称操作','点群の決定','指標表とスペクトル選択律（IR/Raman）']},
  {id:'p3', subj:'physical', week:3, title:'相平衡・混合物（アトキンス）', items:['純物質の相図（三重点・臨界点）','部分モル量・化学ポテンシャル','束一的性質・Raoult/Henry・活量']},

  /* ===== WEEK 4 ===== */

  {id:'b5', subj:'biochem', week:5, title:'クエン酸回路と酸化的リン酸化（ヴォート 17〜19章）', items:['クエン酸回路（TCA）','電子伝達系','酸化的リン酸化・化学浸透説']},

  /* ===== WEEK 6 ===== */
  {id:'o6', subj:'organic', week:6, title:'共役系と芳香族（ボルハルト 14〜16章）', items:['14章 非局在化π系（共役ジエン）','15章 ベンゼンと芳香族性（Hückel則）','16章 芳香族求電子置換（配向性）']},

/* ---------- メェだい SVG（ヤギキャラ・段階別／白い体・ピンクの耳と鼻・小さな角） ---------- */
function meidaiSVG(stage){
  const white='#FCFCFF', wSh='#E7E6F5', pink='#F3A6C3', pSh='#E487AD',
        horn='#ECDCC6', hSh='#D6C0A2', eye='#2B2550', cheek='#F9C4D6';

  // ===== たまご段階 =====
  if(stage===0){
    return `<svg viewBox="0 0 200 200">
      <ellipse cx="100" cy="182" rx="52" ry="9" fill="rgba(0,0,0,.12)"/>
      <path d="M89 31 Q84 17 92 12 Q97 20 96 30 Z" fill="${horn}" stroke="${hSh}" stroke-width="2"/>
      <path d="M111 31 Q116 17 108 12 Q103 20 104 30 Z" fill="${horn}" stroke="${hSh}" stroke-width="2"/>
      <path d="M100 30 C62 30 47 95 47 125 a53 58 0 0 0 106 0 C153 95 138 30 100 30Z" fill="${white}" stroke="${wSh}" stroke-width="3"/>
      <path d="M62 104 l12 -10 l10 12 l12 -12 l10 12 l12 -12 l10 12" fill="none" stroke="${wSh}" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="86" cy="132" r="6.5" fill="${eye}"/><circle cx="114" cy="132" r="6.5" fill="${eye}"/>
      <circle cx="88" cy="129" r="2.2" fill="#fff"/><circle cx="116" cy="129" r="2.2" fill="#fff"/>
      <circle cx="73" cy="151" r="8" fill="${cheek}" opacity=".6"/><circle cx="127" cy="151" r="8" fill="${cheek}" opacity=".6"/>
      <ellipse cx="100" cy="148" rx="9.5" ry="7.5" fill="${pink}" stroke="${pSh}" stroke-width="2"/>
      <path d="M100 156 q-6 7 -12 3 M100 156 q6 7 12 3" stroke="#C98AA0" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <path d="M150 58 l6 -14 M159 68 l14 -6 M151 84 l9 0" stroke="#FFD66B" stroke-width="3" stroke-linecap="round"/>
    </svg>`;
  }

  // ===== ヤギ段階（1〜5） =====
  const sc=[0,.62,.78,.92,1,1.05][stage];
  const cx=100, bodyCy=132, bRx=40*sc, bRy=44*sc;
  const faceCy=bodyCy-bRy*.72, faceR=29*sc;

  // 体・脚・腕
  let body='';
  body+=`<ellipse cx="100" cy="185" rx="${bRx}" ry="9" fill="rgba(0,0,0,.12)"/>`;
  body+=`<ellipse cx="${cx-bRx*.5}" cy="${bodyCy+bRy*.72}" rx="${15*sc}" ry="${10*sc}" fill="${white}" stroke="${wSh}" stroke-width="2"/>`;
  body+=`<ellipse cx="${cx+bRx*.5}" cy="${bodyCy+bRy*.72}" rx="${15*sc}" ry="${10*sc}" fill="${white}" stroke="${wSh}" stroke-width="2"/>`;
  body+=`<ellipse cx="${cx}" cy="${bodyCy}" rx="${bRx}" ry="${bRy}" fill="${white}" stroke="${wSh}" stroke-width="2"/>`;
  body+=`<ellipse cx="${cx-bRx*.9}" cy="${bodyCy}" rx="${10*sc}" ry="${17*sc}" fill="${white}" stroke="${wSh}" stroke-width="2" transform="rotate(22 ${cx-bRx*.9} ${bodyCy})"/>`;
  body+=`<ellipse cx="${cx+bRx*.9}" cy="${bodyCy}" rx="${10*sc}" ry="${17*sc}" fill="${white}" stroke="${wSh}" stroke-width="2" transform="rotate(-22 ${cx+bRx*.9} ${bodyCy})"/>`;

  // マフラー（stage>=4）
  let scarf='';
  if(stage>=4){
    scarf=`<rect x="${cx-faceR*1.05}" y="${faceCy+faceR*.82}" width="${faceR*2.1}" height="${11*sc}" rx="${5*sc}" fill="#7B70F5"/>
           <rect x="${cx-faceR*.22}" y="${faceCy+faceR*.98}" width="${12*sc}" height="${20*sc}" rx="3" fill="#6960E0"/>`;
  }

  // 頭（耳→角→顔の順で重ねる）
  let head='';
  // 耳（ピンク・横に張り出す）
  head+=`<ellipse cx="${cx-faceR*1.02}" cy="${faceCy+faceR*.05}" rx="${faceR*.58}" ry="${faceR*.33}" fill="${pink}" stroke="${pSh}" stroke-width="2" transform="rotate(-32 ${cx-faceR*1.02} ${faceCy})"/>`;
  head+=`<ellipse cx="${cx+faceR*1.02}" cy="${faceCy+faceR*.05}" rx="${faceR*.58}" ry="${faceR*.33}" fill="${pink}" stroke="${pSh}" stroke-width="2" transform="rotate(32 ${cx+faceR*1.02} ${faceCy})"/>`;
  // 角（小さく上向きにカーブ）
  head+=`<path d="M${cx-faceR*.48} ${faceCy-faceR*.68} Q${cx-faceR*.86} ${faceCy-faceR*1.12} ${cx-faceR*.56} ${faceCy-faceR*1.48} Q${cx-faceR*.32} ${faceCy-faceR*1.08} ${cx-faceR*.26} ${faceCy-faceR*.7} Z" fill="${horn}" stroke="${hSh}" stroke-width="2"/>`;
  head+=`<path d="M${cx+faceR*.48} ${faceCy-faceR*.68} Q${cx+faceR*.86} ${faceCy-faceR*1.12} ${cx+faceR*.56} ${faceCy-faceR*1.48} Q${cx+faceR*.32} ${faceCy-faceR*1.08} ${cx+faceR*.26} ${faceCy-faceR*.7} Z" fill="${horn}" stroke="${hSh}" stroke-width="2"/>`;
  // 顔（白い丸）
  head+=`<circle cx="${cx}" cy="${faceCy}" r="${faceR}" fill="${white}" stroke="${wSh}" stroke-width="2"/>`;
  // 目
  head+=`<circle cx="${cx-faceR*.4}" cy="${faceCy-faceR*.05}" r="${faceR*.12}" fill="${eye}"/>`;
  head+=`<circle cx="${cx+faceR*.4}" cy="${faceCy-faceR*.05}" r="${faceR*.12}" fill="${eye}"/>`;
  head+=`<circle cx="${cx-faceR*.37}" cy="${faceCy-faceR*.09}" r="${faceR*.04}" fill="#fff"/>`;
  head+=`<circle cx="${cx+faceR*.43}" cy="${faceCy-faceR*.09}" r="${faceR*.04}" fill="#fff"/>`;
  // ほっぺ
  head+=`<circle cx="${cx-faceR*.62}" cy="${faceCy+faceR*.32}" r="${faceR*.15}" fill="${cheek}" opacity=".55"/>`;
  head+=`<circle cx="${cx+faceR*.62}" cy="${faceCy+faceR*.32}" r="${faceR*.15}" fill="${cheek}" opacity=".55"/>`;
  // ピンクの鼻（ぽってり）＋口
  head+=`<ellipse cx="${cx}" cy="${faceCy+faceR*.34}" rx="${faceR*.27}" ry="${faceR*.23}" fill="${pink}" stroke="${pSh}" stroke-width="2"/>`;
  head+=`<path d="M${cx} ${faceCy+faceR*.57} q${-faceR*.14} ${faceR*.16} ${-faceR*.26} ${faceR*.05} M${cx} ${faceCy+faceR*.57} q${faceR*.14} ${faceR*.16} ${faceR*.26} ${faceR*.05}" stroke="#C98AA0" stroke-width="2.2" fill="none" stroke-linecap="round"/>`;

  // 帽子・卒業証書
  let cap='';
  if(stage===5){
    cap=`<g transform="translate(${cx},${faceCy-faceR*1.0})">
      <rect x="-7" y="-2" width="14" height="13" rx="2" fill="#2B2550"/>
      <polygon points="-29,-6 0,-15 29,-6 0,3" fill="#2B2550"/>
      <circle cx="23" cy="-5" r="2.5" fill="#FFD66B"/>
      <path d="M23 -5 L27 11" stroke="#FFD66B" stroke-width="2"/><circle cx="27" cy="13" r="3" fill="#FFD66B"/></g>`;
    cap+=`<g transform="rotate(-12 70 152)"><rect x="50" y="142" width="32" height="22" rx="3" fill="#fff" stroke="${wSh}" stroke-width="2"/><path d="M55 149h22M55 155h22M55 161h14" stroke="#C9C8E0" stroke-width="2" stroke-linecap="round"/><circle cx="82" cy="153" r="5.5" fill="#EF5656"/></g>`;
  } else if(stage===4){
    cap=`<g transform="translate(${cx},${faceCy-faceR*.92})"><polygon points="-25,-3 0,-11 25,-3 0,5" fill="#3F3A6E"/><rect x="-6" y="-3" width="12" height="11" rx="2" fill="#3F3A6E"/></g>`;
  }

  return `<svg viewBox="0 0 200 200">${body}${scarf}${head}${cap}</svg>`;
}

/* ---------- メェだいの家＆金のりんご SVG（レベル 0〜11） ---------- */
function houseSVG(level){
  const L=Math.max(0,Math.min(11,level));
  const grass='#93D9A8',grassD='#6EC089',sky1='#DCEBFF',sky2='#F3F8FF';
  const trunk='#9C6B45',leaf='#5CB980',leafD='#49A26C',gold='#F4B324',goldSh='#D8960E',goldHi='#FFE79A';
  let s=`<rect x="0" y="0" width="320" height="200" rx="16" fill="url(#skyG)"/>
    <defs><linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${sky1}"/><stop offset="1" stop-color="${sky2}"/></linearGradient></defs>
    <circle cx="278" cy="36" r="17" fill="#FFD86B"/><circle cx="278" cy="36" r="17" fill="#FFEBA6" opacity=".5"/>
    <path d="M0 152 Q160 128 320 152 L320 200 L0 200Z" fill="${grass}"/>
    <path d="M0 168 Q160 150 320 168 L320 200 L0 200Z" fill="${grassD}" opacity=".6"/>`;

  // ===== 家 =====
  const hx=82, hy=152;
  if(L===0){
    s+=`<rect x="${hx-16}" y="140" width="32" height="12" rx="2" fill="#E4C48A"/><rect x="${hx-2}" y="140" width="4" height="14" fill="#B98F52"/>
        <text x="${hx}" y="149" font-size="8" text-anchor="middle" fill="#8A6A3A" font-weight="700">予定地</text>`;
  } else if(L===1){ // テント
    s+=`<polygon points="${hx},118 ${hx-26},152 ${hx+26},152" fill="#E88C6A" stroke="#C96F4E" stroke-width="2"/>
        <polygon points="${hx},118 ${hx},152 ${hx-9},152" fill="#D97B5A"/>`;
  } else {
    const hs=0.62+0.045*L; const hw=52*hs, hh=38*hs;
    const wall = L>=8?'#EAD9B0' : L>=5?'#D98A6A' : '#CDA070';
    const wallSh = L>=8?'#D8C393' : L>=5?'#C4744F' : '#B4885A';
    const roof = L>=9?'#F4B324' : '#7E62AB';
    s+=`<rect x="${hx-hw/2}" y="${hy-hh}" width="${hw}" height="${hh}" rx="3" fill="${wall}" stroke="${wallSh}" stroke-width="2"/>
        <polygon points="${hx-hw/2-6},${hy-hh} ${hx+hw/2+6},${hy-hh} ${hx},${hy-hh-24*hs}" fill="${roof}" stroke="${wallSh}" stroke-width="1.5"/>
        <rect x="${hx-6*hs}" y="${hy-16*hs}" width="${12*hs}" height="${16*hs}" rx="1.5" fill="#8A5A3A"/>
        <rect x="${hx+hw/2-16*hs}" y="${hy-hh+7*hs}" width="${10*hs}" height="${10*hs}" rx="1.5" fill="#BFE3FF" stroke="${wallSh}" stroke-width="1.5"/>`;
    if(L>=5) s+=`<rect x="${hx-hw/2+6}" y="${hy-hh-20*hs}" width="7" height="16" rx="1.5" fill="#8A5A3A"/>`; // 煙突
    if(L>=10) s+=`<g stroke="#C9A66B" stroke-width="3" stroke-linecap="round"><path d="M18 176V166M34 176V166M50 176V166M18 170H50"/></g>`; // 柵（牧場）
  }

  // ===== りんごの木 =====
  const tx=228, tyBase=152;
  if(L===0){
    s+=`<path d="M${tx} ${tyBase} q-6 -10 -1 -16 q5 6 1 16Z" fill="${leaf}"/><path d="M${tx} ${tyBase} q6 -8 1 -14" fill="none" stroke="${leafD}" stroke-width="2"/>`; // 芽
  } else {
    const ts=0.45+0.055*L; const fCy=tyBase-40*ts-6, R=34*ts;
    s+=`<rect x="${tx-5*ts}" y="${tyBase-34*ts}" width="${10*ts}" height="${36*ts}" rx="3" fill="${trunk}"/>`;
    [[-R*0.6,0,R*0.75],[R*0.6,0,R*0.75],[0,-R*0.55,R*0.8],[0,R*0.3,R*0.7]].forEach(c=>{
      s+=`<circle cx="${tx+c[0]}" cy="${fCy+c[1]}" r="${c[2]}" fill="${leaf}"/>`;});
    s+=`<circle cx="${tx}" cy="${fCy}" r="${R}" fill="${leafD}" opacity=".25"/>`;
    // 金のりんご（レベル分）
    const spots=[[-10,-4],[12,-2],[0,12],[-18,8],[18,10],[6,-16],[-8,16],[20,-12],[-20,-8],[10,20],[-2,-22]];
    for(let i=0;i<L && i<spots.length;i++){
      const ax=tx+spots[i][0]*ts, ay=fCy+spots[i][1]*ts, ar=4.2*ts+1;
      s+=`<circle cx="${ax}" cy="${ay}" r="${ar}" fill="${gold}" stroke="${goldSh}" stroke-width="1"/>
          <circle cx="${ax-ar*0.3}" cy="${ay-ar*0.3}" r="${ar*0.3}" fill="${goldHi}"/>
          <path d="M${ax} ${ay-ar} q1 -3 3 -4" stroke="#7A5A2E" stroke-width="1" fill="none"/>`;
    }
  }
  return `<svg viewBox="0 0 320 200">${s}</svg>`;
}

/* ---------- ふりゃあ SVG（名大祭マスコット・段階別／クリーム体・緑の長耳・オレンジ房） ---------- */
function furyaSVG(stage){
  const cream='#F7EEC8',creamSh='#E6D6A2',grn='#1F7A4E',grnD='#125A38',grnHi='#46A876',
        org='#F49A2C',orgSh='#DE7E17',blue='#3A78C2',pupil='#17172B',pink='#F3A6C3',pSh='#E487AD',
        red='#E8432E',tongue='#F2705B',cheek='#F9C4D6',gold='#F4B324',goldSh='#D8960E';

  // ===== たまご段階 =====
  if(stage===0){
    return `<svg viewBox="0 0 200 200">
      <ellipse cx="100" cy="182" rx="52" ry="9" fill="rgba(0,0,0,.12)"/>
      <path d="M92 26 q-3 -12 4 -15 M100 22 q0 -12 0 -14 M108 26 q3 -12 -4 -15" stroke="${org}" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M100 30 C62 30 47 95 47 125 a53 58 0 0 0 106 0 C153 95 138 30 100 30Z" fill="${cream}" stroke="${creamSh}" stroke-width="3"/>
      <path d="M62 104 l12 -10 l10 12 l12 -12 l10 12 l12 -12 l10 12" fill="none" stroke="${grn}" stroke-width="3" stroke-linejoin="round"/>
      <ellipse cx="78" cy="150" rx="10" ry="12" fill="${grn}" opacity=".85"/><ellipse cx="122" cy="150" rx="10" ry="12" fill="${grn}" opacity=".85"/>
      <circle cx="86" cy="133" r="6.5" fill="${pupil}"/><circle cx="114" cy="133" r="6.5" fill="${pupil}"/>
      <circle cx="88" cy="130" r="2.2" fill="#fff"/><circle cx="116" cy="130" r="2.2" fill="#fff"/>
      <ellipse cx="100" cy="146" rx="5" ry="4" fill="${pink}"/>
      <path d="M92 156 q8 8 16 0" stroke="${red}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </svg>`;
  }

  // ===== 成長段階（1〜4） =====
  const sc=[0,.62,.8,.92,1.05][stage];
  const cx=100, bodyCy=138, bRx=40*sc, bRy=42*sc;
  const faceCy=bodyCy-bRy*.8, faceR=30*sc;

  let s='';
  s+=`<ellipse cx="100" cy="186" rx="${bRx}" ry="9" fill="rgba(0,0,0,.12)"/>`;

  // 長い緑の耳（頭の横から下へ、体の後ろ）
  const earTop=faceCy+faceR*.1, earBot=bodyCy+bRy*.85, earMid=(earTop+earBot)/2, earH=(earBot-earTop)/2, earW=13*sc;
  [[-1,-28],[1,28]].forEach(d=>{
    const ex=cx+d[0]*(faceR*.92)+d[1]*sc*0; const exx=cx+d[0]*(faceR*.95);
    s+=`<ellipse cx="${exx}" cy="${earMid}" rx="${earW}" ry="${earH}" fill="${grn}" stroke="${grnD}" stroke-width="2" transform="rotate(${d[0]*8} ${exx} ${earMid})"/>`;
    s+=`<ellipse cx="${exx-earW*.3}" cy="${earMid-earH*.35}" rx="${earW*.4}" ry="${earH*.4}" fill="${grnHi}" opacity=".55" transform="rotate(${d[0]*8} ${exx} ${earMid})"/>`;
  });

  // 体・脚・腕（クリーム）
  s+=`<ellipse cx="${cx-bRx*.42}" cy="${bodyCy+bRy*.78}" rx="${13*sc}" ry="${10*sc}" fill="${cream}" stroke="${creamSh}" stroke-width="2"/>`;
  s+=`<ellipse cx="${cx+bRx*.42}" cy="${bodyCy+bRy*.78}" rx="${13*sc}" ry="${10*sc}" fill="${cream}" stroke="${creamSh}" stroke-width="2"/>`;
  s+=`<ellipse cx="${cx}" cy="${bodyCy}" rx="${bRx}" ry="${bRy}" fill="${cream}" stroke="${creamSh}" stroke-width="2"/>`;
  s+=`<path d="M${cx-bRx*.55} ${bodyCy-bRy*.35} Q${cx} ${bodyCy+bRy*.5} ${cx+bRx*.55} ${bodyCy-bRy*.35}" fill="#fff" opacity=".85"/>`; // 白いお腹
  s+=`<ellipse cx="${cx-bRx*.86}" cy="${bodyCy+bRy*.1}" rx="${9*sc}" ry="${13*sc}" fill="${cream}" stroke="${creamSh}" stroke-width="2" transform="rotate(24 ${cx-bRx*.86} ${bodyCy})"/>`;
  s+=`<ellipse cx="${cx+bRx*.86}" cy="${bodyCy+bRy*.1}" rx="${9*sc}" ry="${13*sc}" fill="${cream}" stroke="${creamSh}" stroke-width="2" transform="rotate(-24 ${cx+bRx*.86} ${bodyCy})"/>`;

  // 頭（クリーム丸）
  s+=`<circle cx="${cx}" cy="${faceCy}" r="${faceR}" fill="${cream}" stroke="${creamSh}" stroke-width="2"/>`;
  // 目の周りの緑マスク
  s+=`<ellipse cx="${cx-faceR*.42}" cy="${faceCy+faceR*.02}" rx="${faceR*.4}" ry="${faceR*.52}" fill="${grn}"/>`;
  s+=`<ellipse cx="${cx+faceR*.42}" cy="${faceCy+faceR*.02}" rx="${faceR*.4}" ry="${faceR*.52}" fill="${grn}"/>`;
  // 大きな目
  const ex=faceR*.42, ey=faceCy+faceR*.04, er=faceR*.3;
  s+=`<circle cx="${cx-ex}" cy="${ey}" r="${er}" fill="#fff"/><circle cx="${cx+ex}" cy="${ey}" r="${er}" fill="#fff"/>`;
  s+=`<circle cx="${cx-ex}" cy="${ey+er*.15}" r="${er*.62}" fill="${blue}"/><circle cx="${cx+ex}" cy="${ey+er*.15}" r="${er*.62}" fill="${blue}"/>`;
  s+=`<circle cx="${cx-ex}" cy="${ey+er*.2}" r="${er*.32}" fill="${pupil}"/><circle cx="${cx+ex}" cy="${ey+er*.2}" r="${er*.32}" fill="${pupil}"/>`;
  s+=`<circle cx="${cx-ex+er*.3}" cy="${ey-er*.25}" r="${er*.22}" fill="#fff"/><circle cx="${cx+ex+er*.3}" cy="${ey-er*.25}" r="${er*.22}" fill="#fff"/>`;
  // ほっぺ・鼻・口
  s+=`<circle cx="${cx-faceR*.72}" cy="${faceCy+faceR*.42}" r="${faceR*.14}" fill="${cheek}" opacity=".6"/>`;
  s+=`<circle cx="${cx+faceR*.72}" cy="${faceCy+faceR*.42}" r="${faceR*.14}" fill="${cheek}" opacity=".6"/>`;
  s+=`<path d="M${cx-faceR*.09} ${faceCy+faceR*.34} h${faceR*.18} l${-faceR*.09} ${faceR*.1} Z" fill="${pink}" stroke="${pSh}" stroke-width="1"/>`;
  s+=`<path d="M${cx} ${faceCy+faceR*.46} Q${cx-faceR*.2} ${faceCy+faceR*.7} ${cx-faceR*.28} ${faceCy+faceR*.5} M${cx} ${faceCy+faceR*.46} Q${cx+faceR*.2} ${faceCy+faceR*.7} ${cx+faceR*.28} ${faceCy+faceR*.5}" stroke="${red}" stroke-width="2" fill="${red}"/>`;
  s+=`<ellipse cx="${cx}" cy="${faceCy+faceR*.62}" rx="${faceR*.13}" ry="${faceR*.1}" fill="${tongue}"/>`;

  // 頭の飾り：クリームの冠バンド＋左右のオレンジ房＋中央の房
  const topY=faceCy-faceR*.92;
  for(let i=-2;i<=2;i++){s+=`<circle cx="${cx+i*faceR*.34}" cy="${topY+Math.abs(i)*faceR*.06+faceR*.1}" r="${faceR*.16}" fill="${cream}" stroke="${creamSh}" stroke-width="1.5"/>`;}
  // 中央のクリーム房
  s+=`<path d="M${cx-faceR*.18} ${topY} l${faceR*.06} ${-faceR*.34} l${faceR*.09} ${faceR*.22} l${faceR*.09} ${-faceR*.3} l${faceR*.09} ${faceR*.32} l${faceR*.09} ${-faceR*.22} l${faceR*.06} ${faceR*.32} Z" fill="${cream}" stroke="${creamSh}" stroke-width="1.5" stroke-linejoin="round"/>`;
  // 左右オレンジ房（緑の葉＋オレンジのぽんぽん）
  [[-1],[1]].forEach(d=>{
    const tx=cx+d[0]*faceR*.72, ty=topY-faceR*.18;
    s+=`<path d="M${tx-6*sc} ${ty+6*sc} q${-4*sc} ${-10*sc} ${2*sc} ${-14*sc} M${tx+6*sc} ${ty+6*sc} q${4*sc} ${-10*sc} ${-2*sc} ${-14*sc}" stroke="${grn}" stroke-width="${4*sc}" fill="none" stroke-linecap="round"/>`;
    s+=`<circle cx="${tx}" cy="${ty-6*sc}" r="${8*sc}" fill="${org}" stroke="${orgSh}" stroke-width="1.5"/>`;
    s+=`<circle cx="${tx-3*sc}" cy="${ty-9*sc}" r="${3*sc}" fill="#FFD08A"/>`;
  });

  // キングふりゃあ（最大）に金の冠
  if(stage===4){
    s+=`<g transform="translate(${cx},${topY-faceR*.5})"><path d="M-16 6 L-16 -6 L-8 2 L0 -10 L8 2 L16 -6 L16 6 Z" fill="${gold}" stroke="${goldSh}" stroke-width="1.5" stroke-linejoin="round"/><circle cx="0" cy="-10" r="2.5" fill="#EF5656"/></g>`;
  }
  return `<svg viewBox="0 0 200 200">${s}</svg>`;
}

/* ---------- アカウント（複数ユーザー対応） ---------- */
const ACCTS_KEY='meidai_accounts', CUR_KEY='meidai_current', LEGACY_KEY='meidai_inshi_v1';
function loadAccounts(){try{return JSON.parse(localStorage.getItem(ACCTS_KEY))||[]}catch(e){return[]}}
function saveAccounts(a){localStorage.setItem(ACCTS_KEY,JSON.stringify(a))}
function currentAccountId(){return localStorage.getItem(CUR_KEY)||''}
function currentAccount(){return loadAccounts().find(a=>a.id===currentAccountId())||null}
function acctName(){const a=currentAccount();return a?a.name:'ゲスト'}
function stateKeyFor(id){return 'meidai_state_'+id}
function LSKEY(){return stateKeyFor(currentAccountId())}

/* ---------- 状態の保存（アカウント別） ---------- */
function loadState(){
  let st={};try{st=JSON.parse(localStorage.getItem(LSKEY()))||{}}catch(e){}
  st.done=st.done||{};            // {topicId:[bool,...]}
  st.examDate=st.examDate||DEFAULT_EXAM;
  st.startDate=st.startDate||nextMonday(); // 第1週の月曜（来週スタート）
  st.streak=st.streak||0; st.lastDay=st.lastDay||null; st.seenStage=st.seenStage??0;
  st.examChk=st.examChk||{};       // {year:[bool,...]} 年度別過去問
  st.dailyDone=st.dailyDone||{};   // {dateStr:{c:正解数,n:問題数}}
  st.quizStreak=st.quizStreak||0; st.quizLastDay=st.quizLastDay||null;
  st.study=st.study||{};           // {dateStr:分} 勉強時間の記録
  st.seenHouse=st.seenHouse??0;    // 到達済みの家レベル
  st.furyaBorn=st.furyaBorn||false;// メェだいが卵を産んでふりゃあ誕生したか
  st.seenFurya=st.seenFurya??-1;   // 見たふりゃあ段階（-1=未誕生）
  st.cheer=st.cheer||{};           // {dateStr:その日に出した最大ティア}
  // 学習プランを「来週の月曜」開始へ移行（チェック進捗は保持）。v2で日付ズレも補正
  if(st.startShift!==2){st.startDate=nextMonday();st.startShift=2;}
  return st;
}

/* ---------- 日付ユーティリティ（ローカルタイム基準・UTCズレ防止） ---------- */
function isoLocal(d){d=new Date(d);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function mondayOf(d){d=new Date(d);const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);d.setHours(0,0,0,0);return isoLocal(d);}
function nextMonday(){const d=new Date(mondayOf(new Date()));d.setDate(d.getDate()+7);return isoLocal(d);} // 来週の月曜
function planSpan(){const start=new Date(S.startDate);const exam=new Date(S.examDate);let days=(exam-start)/864e5;if(!(days>=8))days=56;return{start,days};}
function weekDue(week){const{start,days}=planSpan();const d=new Date(start);d.setDate(d.getDate()+Math.round(days*week/8)-1);return d;} // 試験日までを8等分
function fmtDate(d){return `${d.getMonth()+1}/${d.getDate()}`}
function fmtFull(d){const w=['日','月','火','水','木','金','土'][d.getDay()];return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}(${w})`}
function todayStr(){return isoLocal(new Date())}
function currentWeek(){const{start,days}=planSpan();const el=(new Date(todayStr())-start)/864e5;const w=Math.ceil((el/days)*8)||1;return Math.min(Math.max(w,1),8);}

/* ---------- 進捗計算 ---------- */
function topicDoneArr(id){const t=TOPICS.find(x=>x.id===id);const a=S.done[id]||[];return t.items.map((_,i)=>!!a[i]);}
function topicCount(id){const a=topicDoneArr(id);return{done:a.filter(Boolean).length,total:a.length};}
function topicPct(id){const c=topicCount(id);return c.total?Math.round(c.done/c.total*100):0;}
function topicFull(id){const c=topicCount(id);return c.total>0&&c.done===c.total;}
function weekFull(week){return TOPICS.filter(t=>t.week===week).every(t=>topicFull(t.id));}
function weeksCompleted(){let n=0;for(let w=1;w<=8;w++)if(weekFull(w))n++;return n;}
/* 年度別過去問 */
function examDoneArr(y){const a=S.examChk[y]||[];return EXAM_ITEMS.map((_,i)=>!!a[i]);}
function examCount(y){const a=examDoneArr(y);return{done:a.filter(Boolean).length,total:EXAM_ITEMS.length};}
function examFull(y){return examCount(y).done===EXAM_ITEMS.length;}
function yearsCompleted(){return EXAMS.filter(e=>examFull(e.yr)).length;}
/* 小テスト */
function quizDays(){return Object.keys(S.dailyDone).length;}
/* ミッション＝週クリア＋年度クリア＋小テスト7日ごと（参考指標） */
function missions(){return weeksCompleted()+yearsCompleted()+Math.floor(quizDays()/7);}
/* 最終進化条件：4科目のうち3科目が100% ＋ 過去問を全年度クリア */
function subjectsMaxed(){return Object.keys(SUBJECTS).filter(k=>subjPct(k)===100).length;}
function allExamsDone(){return yearsCompleted()>=EXAMS.length;}
function isFullyMaxed(){return subjectsMaxed()>=3 && allExamsDone();}
/* 勉強時間・メェだいの家 */
function studyTotalMin(){return Object.values(S.study||{}).reduce((a,b)=>a+(b||0),0);}
function studyHours(){return studyTotalMin()/60;}
function houseLevel(){const h=studyHours();let n=0;HOUSE_HOURS.forEach(x=>{if(h>=x)n++});return n;} // 0〜11
function nextHouseHour(){return HOUSE_HOURS[houseLevel()]||null;}
function goldenApples(){return houseLevel();} // 家レベル分の金のりんご
/* ---- 育成率（%）：メェだいは細分化した連続成長 ---- */
function examItemsPct(){const tot=EXAMS.length*EXAM_ITEMS.length;if(!tot)return 0;let d=0;EXAMS.forEach(e=>d+=examCount(e.yr).done);return d/tot*100;}
function quizPct(){return Math.min(quizDays()/30,1)*100;}     // 30日で満点
function studyPct(){return Math.min(studyHours()/500,1)*100;} // 500hで満点
function meidaiPct(){return Math.round(totalPct()*0.4 + examItemsPct()*0.25 + studyPct()*0.2 + quizPct()*0.15);}
function stageForPct(p){if(p>=80)return 4;if(p>=60)return 3;if(p>=40)return 2;if(p>=15)return 1;return 0;}
function currentStage(){return isFullyMaxed()?5:stageForPct(meidaiPct());}
/* ---- ふりゃあ：育成率60%で誕生。勉強・過去問・小テストの3本柱で育つ ---- */
function isFuryaBorn(){return S.furyaBorn||meidaiPct()>=FURYA_BIRTH;}
function furyaPct(){return Math.round((examItemsPct()+quizPct()+studyPct())/3);}
function furyaMaxed(){return yearsCompleted()>=EXAMS.length && quizDays()>=30 && studyHours()>=500;}
function furyaStage(){if(furyaMaxed())return 4;const p=furyaPct();if(p>=66)return 3;if(p>=40)return 2;if(p>=15)return 1;return 0;}
function subjPct(subj){const ts=TOPICS.filter(t=>t.subj===subj);let d=0,tot=0;ts.forEach(t=>{const c=topicCount(t.id);d+=c.done;tot+=c.total});return tot?Math.round(d/tot*100):0;}
function subjRemain(subj){return TOPICS.filter(t=>t.subj===subj&&!topicFull(t.id)).length;}
function totalPct(){let d=0,tot=0;TOPICS.forEach(t=>{const c=topicCount(t.id);d+=c.done;tot+=c.total});return tot?Math.round(d/tot*100):0;}
function totalXP(){let xp=0;
  TOPICS.forEach(t=>{const c=topicCount(t.id);xp+=c.done*10;if(topicFull(t.id))xp+=50;});
  for(let w=1;w<=8;w++)if(weekFull(w))xp+=200;
  EXAMS.forEach(e=>{const c=examCount(e.yr);xp+=c.done*20;if(examFull(e.yr))xp+=100;});
  Object.values(S.dailyDone).forEach(d=>{xp+=(d.c||0)*15+30;});
  xp+=Math.round(studyHours()*10); // 勉強1時間ごとに+10XP
  return xp;}
const XP_PER_LV=300;
function level(){return Math.floor(totalXP()/XP_PER_LV)+1;}
function xpInLv(){return totalXP()%XP_PER_LV;}
function daysToExam(){return Math.ceil((new Date(S.examDate)-new Date(todayStr()))/864e5);}

/* ---------- チェック操作 ---------- */
function toggleItem(id,idx){
  const arr=S.done[id]||(S.done[id]=[]);
  arr[idx]=!arr[idx];
  // ストリーク
  const t=todayStr();
  if(S.lastDay!==t){const y=new Date(t);y.setDate(y.getDate()-1);S.streak=(S.lastDay===y.toISOString().slice(0,10))?S.streak+1:1;S.lastDay=t;}
  saveState();
  checkEvolution();
  render();
}

/* ---------- 進化チェック ---------- */
function checkEvolution(){
  const ns=currentStage();
  if(ns>S.seenStage){S.seenStage=ns;saveState();showEvolution(ns);}
  else if(ns<S.seenStage){S.seenStage=ns;saveState();}
  // ふりゃあ誕生（メェだい育成率60%）
  if(!S.furyaBorn && meidaiPct()>=FURYA_BIRTH){S.furyaBorn=true;S.seenFurya=furyaStage();saveState();showFuryaBirth();return;}
  // ふりゃあ成長
  if(isFuryaBorn()){const fs=furyaStage();if(fs>S.seenFurya){S.seenFurya=fs;saveState();showFuryaUp(fs);}else if(fs<S.seenFurya){S.seenFurya=fs;saveState();}}
}

/* 勉強時間を記録（分）→ 家＆金のりんごが成長 */
function addStudy(min){
  if(!min||min<=0)return;
  const t=todayStr();
  const before=houseLevel();
  S.study[t]=(S.study[t]||0)+min;
  if(S.lastDay!==t){const y=new Date(t);y.setDate(y.getDate()-1);S.streak=(S.lastDay===y.toISOString().slice(0,10))?S.streak+1:1;S.lastDay=t;}
  saveState();
  const after=houseLevel();
  if(after>before){S.seenHouse=after;saveState();showHouseUp(after);}
  else toast(`+${min}分 記録！ 累計 ${studyHours().toFixed(1)}時間 📚`);
  checkEvolution(); // 育成率が上がりメェだい進化・ふりゃあ誕生する場合あり
  render();
  maybeCheer();
}

/* 小テスト：今日の問題を日付から決定的に選ぶ（4問・科目バランス） */
function dayKey(){return new Date(todayStr()).getTime();}
function seededIdx(seed,mod){let x=Math.sin(seed)*10000;return Math.floor((x-Math.floor(x))*mod);}
function todaysQuiz(){
  const day=Math.floor(dayKey()/864e5);
  const subs=['organic','inorganic','physical','biochem'];
  const out=[];
  subs.forEach((sj,k)=>{
    const pool=QUIZ_POOL.map((q,i)=>({q,i})).filter(o=>o.q.subj===sj);
    const pick=pool[(day+k)%pool.length];
    out.push(pick.i);
  });
  return out; // QUIZ_POOL のindex 3つ
}
let quizSel={}; // {poolIdx:選択肢index}
let quizSubmitted=false;
function selectOpt(pi,oi){if(quizSubmitted)return;quizSel[pi]=oi;render();}
function submitQuiz(){
  const ids=todaysQuiz();
  if(ids.some(i=>quizSel[i]===undefined)){toast('全問えらんでね！');return;}
  quizSubmitted=true;
  let c=0;ids.forEach(i=>{if(quizSel[i]===QUIZ_POOL[i].ans)c++;});
  S.dailyDone[todayStr()]={c,n:ids.length};
  // 小テストの連続記録
  const t=todayStr();
  if(S.quizLastDay!==t){const y=new Date(t);y.setDate(y.getDate()-1);S.quizStreak=(S.quizLastDay===y.toISOString().slice(0,10))?S.quizStreak+1:1;S.quizLastDay=t;}
  if(S.lastDay!==t){const y=new Date(t);y.setDate(y.getDate()-1);S.streak=(S.lastDay===y.toISOString().slice(0,10))?S.streak+1:1;S.lastDay=t;}
  saveState();checkEvolution();render();
  toast(`今日の小テスト達成！ ${c}/${ids.length} 正解 🐐`);
}

    c.animate([{transform:`translateY(0) rotate(0)`,opacity:1},{transform:`translateY(105vh) rotate(${720*(Math.random()>.5?1:-1)}deg)`,opacity:.9}],{duration:dur*1000,easing:'cubic-bezier(.3,.6,.5,1)'});
    document.body.appendChild(c);setTimeout(()=>c.remove(),dur*1000);
  }
}

function renderQuiz(){

  const lvl=houseLevel(), nextH=nextHouseHour(), h=studyHours();
  const todayMin=S.study[todayStr()]||0;
  const prevH=HOUSE_HOURS[lvl-1]||0;
  const pct=nextH?Math.min(100,Math.round((h-prevH)/(nextH-prevH)*100)):100;
  const days=[...Array(7)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));const k=isoLocal(d);return{m:S.study[k]||0,lbl:'日月火水木金土'[d.getDay()],today:k===todayStr()};});
  const maxm=Math.max(90,...days.map(d=>d.m));
  return `
  <div class="main-hd"><div>
    <div class="greeting">⏱️ 勉強時間の記録</div>
    <div class="greeting-sub">毎日の勉強時間を記録。累計が節目に届くとメェだいの家と金のりんごが育つメェ🐐🍎</div>
  </div></div>
  <div class="view-pad">
    <div class="hero" style="grid-template-columns:320px 1fr">
      <div class="meidai-card" style="background:linear-gradient(160deg,#2E7D5B,#63B48A)">
        <div class="meidai-stage-name">${HOUSE_NAMES[lvl]}</div>
        <div class="house-mini" style="margin:6px 0">${houseSVG(lvl)}</div>
        <div class="meidai-name">累計 ${h.toFixed(1)} 時間</div>
        <div class="meidai-lv">家レベル ${lvl}/11 ・ 金のりんご ${goldenApples()}個</div>
        <div class="meidai-xpbar"><i style="width:${pct}%"></i></div>
        <div class="meidai-xptxt">${nextH?`次の成長まで あと ${(nextH-h).toFixed(1)} 時間（${nextH}h）`:'最大レベル到達！メェだい牧場・黄金郷 🎉'}</div>
      </div>
      <div class="side-panel">
        <div class="subj-prog">
          <div style="font-size:13px;font-weight:700;margin-bottom:10px">今日の勉強時間：<span style="color:var(--bio)">${todayMin}分（${(todayMin/60).toFixed(1)}h）</span></div>
          <div class="study-chips">
            ${[15,30,60,90].map(m=>`<button class="chip" onclick="addStudy(${m})">＋${m}分</button>`).join('')}
          </div>
          <div class="study-row">
            <input id="studyInput" class="fi2" type="number" min="1" placeholder="分を入力" />
            <button class="btn btn-p" onclick="const v=+document.getElementById('studyInput').value;if(v>0)addStudy(v)">今日に追加</button>
          </div>
          <div class="study-note">※ 記録すると連続日数🔥もカウント。勉強1時間ごとに +10XP。</div>
        </div>
        <div class="subj-prog">
          <div style="font-size:13px;font-weight:700;margin-bottom:12px">直近7日</div>
          <div class="wk-bars">
            ${days.map(d=>`<div class="wk-col"><div class="wk-track"><i style="height:${Math.round(d.m/maxm*100)}%;background:${d.today?'var(--bio)':'var(--inorg)'}"></i></div><div class="wk-lbl ${d.today?'on':''}">${d.lbl}</div><div class="wk-min">${d.m||''}</div></div>`).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="sec-hd">🏡 成長の節目 <span class="pill">${lvl}/11 到達</span></div>
    <div class="th-grid">
      ${HOUSE_HOURS.map((x,i)=>`<div class="th-item ${h>=x?'on':''}"><span class="th-h">${x}h</span><span class="th-nm">${HOUSE_NAMES[i+1]}</span>${h>=x?'<span class="th-ok">✓</span>':''}</div>`).join('')}
    </div>
  </div>`;
}

function renderHouse(){
  const lvl=houseLevel(),h=studyHours();
  const strip=HOUSE_NAMES.map((nm,i)=>{
    const unlocked=i<=lvl;
    return `<div class="evo-card ${unlocked?'unlocked':''} ${i===lvl?'current':''}" style="width:170px">
      <div class="house-mini">${unlocked?houseSVG(i):`<div class="evo-locked-emoji">❔</div>`}</div>
      <div class="evo-name">Lv.${i}${i===0?'（さら地）':''}</div>
      <div class="evo-cond">${i===0?'スタート':HOUSE_HOURS[i-1]+'時間で成長'}</div>
      ${i===lvl?'<div class="evo-badge">● いまここ</div>':unlocked?'<div class="evo-badge">獲得済み</div>':''}
    </div>`;
  }).join('');
  return `
  <div class="main-hd"><div>
    <div class="greeting">🏡 メェだいの家</div>
    <div class="greeting-sub">勉強を積み重ねてメェだいの家と金のりんごを育てよう。累計 ${h.toFixed(1)} 時間・家レベル ${lvl}/11。</div>
  </div></div>
  <div class="view-pad">
    <div class="house-big">${houseSVG(lvl)}</div>
    <div class="sec-hd">成長の記録</div>
    <div class="evo-strip">${strip}</div>
    <div class="note" style="margin-top:16px">「勉強時間の記録」から時間を追加すると、累計 <b>10・20・30・50・100・150・200・250・300・400・500 時間</b> の節目ごとに家と金のりんご🍎が成長するメェ。</div>
  </div>`;
}

function renderFurya(){
  const born=isFuryaBorn(), fs=furyaStage(), fp=furyaPct(), mp=meidaiPct();
  if(!born){
    return `
    <div class="main-hd"><div>
      <div class="greeting">🥚 ふりゃあ図鑑</div>
      <div class="greeting-sub">メェだいの育成率が ${FURYA_BIRTH}% に届くと、卵を産んでふりゃあが誕生するメェ。</div>
    </div></div>
    <div class="view-pad">
      <div class="meidai-card" style="max-width:360px;background:linear-gradient(160deg,#155C3A,#2E9E5E)">
        <div class="meidai-stage-name">たまご準備中…</div>
        <div class="meidai-stage" style="opacity:.55">${furyaSVG(0)}</div>
        <div class="meidai-name">？？？</div>
        <div class="meidai-lv">メェだい育成率 ${mp}% / ${FURYA_BIRTH}%</div>
        <div class="meidai-xpbar"><i style="width:${Math.min(100,Math.round(mp/FURYA_BIRTH*100))}%"></i></div>
        <div class="meidai-msg">あと ${Math.max(0,FURYA_BIRTH-mp)}% でふりゃあが生まれるメェ！</div>
      </div>
      <div class="note" style="margin-top:16px">メェだいの育成率は「学習チェック40%・過去問25%・勉強時間20%・小テスト15%」の総合進捗（現在 <b>${mp}%</b>）。<b>60%</b>で卵が誕生！</div>
    </div>`;
  }
  const cards=FURYA_STAGES.map((st,i)=>{
    const unlocked=i<=fs;
    return `<div class="evo-card ${unlocked?'unlocked':''} ${i===fs?'current':''}">
      <div>${unlocked?furyaSVG(i):`<div class="evo-locked-emoji">❔</div>`}</div>
      <div class="evo-name">${unlocked?st.name:'？？？'}</div>
      <div class="evo-cond">${st.cond}</div>
      ${i===fs?'<div class="evo-badge">● いまここ</div>':unlocked?'<div class="evo-badge">獲得済み</div>':''}
    </div>`;
  }).join('');
  const eP=Math.round(examItemsPct()),qP=Math.round(quizPct()),sP=Math.round(studyPct());
  return `
  <div class="main-hd"><div>
    <div class="greeting">🐾 ふりゃあ図鑑</div>
    <div class="greeting-sub">名大祭マスコット「ふりゃあ」。勉強時間・過去問・小テストを全部達成でキングふりゃあ（最大）に！</div>
  </div></div>
  <div class="view-pad">
    <div class="hero" style="grid-template-columns:320px 1fr">
      <div class="meidai-card" style="background:linear-gradient(160deg,#155C3A,#2E9E5E)">
        <div class="meidai-stage-name">${FURYA_STAGES[fs].name}</div>
        <div class="meidai-stage">${furyaSVG(fs)}</div>
        <div class="meidai-name">ふりゃあ</div>
        <div class="meidai-lv">育成度 ${fp}%${furyaMaxed()?'（最大）':''}</div>
        <div class="meidai-xpbar"><i style="width:${fp}%"></i></div>
        <div class="meidai-msg">${FURYA_MSG[fs]}</div>
      </div>
      <div class="side-panel">
        <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
          <div class="stat-card" style="${studyHours()>=500?'border-color:var(--lo)':''}"><span class="sc-ico">⏱️</span><div class="sc-lbl">勉強時間</div><div class="sc-val">${sP}%</div><div class="sc-sub">${studyHours().toFixed(0)}/500h</div></div>
          <div class="stat-card" style="${allExamsDone()?'border-color:var(--lo)':''}"><span class="sc-ico">📄</span><div class="sc-lbl">過去問</div><div class="sc-val">${eP}%</div><div class="sc-sub">${yearsCompleted()}/${EXAMS.length}年度</div></div>
          <div class="stat-card" style="${quizDays()>=30?'border-color:var(--lo)':''}"><span class="sc-ico">📝</span><div class="sc-lbl">小テスト</div><div class="sc-val">${qP}%</div><div class="sc-sub">${quizDays()}/30日</div></div>
        </div>
        <div class="note">ふりゃあ育成度＝<b>勉強時間・過去問・小テスト</b>の平均。3つすべて達成（過去問全年度・勉強500h・小テスト30日）で <b>キングふりゃあ👑</b> に！</div>
      </div>
    </div>
    <div class="sec-hd">ふりゃあの成長</div>
    <div class="evo-strip">${cards}</div>
  </div>`;
}

/* ---------- レンダリング本体 ---------- */
function render(){
  // sidebar mini meidai
  const stage=currentStage();
  document.getElementById('sbMeidaiSvg').innerHTML=meidaiSVG(stage);
  document.getElementById('sbMeidaiName').textContent=STAGES[stage].name;
  document.getElementById('sbMeidaiLv').textContent='Lv.'+level()+' ・ XP '+totalXP();
  document.getElementById('sbXp').style.width=(xpInLv()/XP_PER_LV*100)+'%';
  document.getElementById('sbMark').innerHTML=meidaiSVG(Math.max(stage,1));
  const nm=acctName();document.getElementById('sbUname').textContent=nm;document.getElementById('sbAvatar').textContent=(nm[0]||'?').toUpperCase();
  Object.keys(SUBJECTS).forEach(k=>{const b=document.getElementById('bdg-'+k);if(b)b.textContent=subjRemain(k)||'✓';});
  const bq=document.getElementById('bdg-quiz');if(bq)bq.textContent=S.dailyDone[todayStr()]?'✓':'!';
  const bf=document.getElementById('bdg-furya');if(bf)bf.textContent=isFuryaBorn()?(furyaMaxed()?'👑':'🐾'):'🥚';
  // main
  const m=document.getElementById('main');
  if(VIEW==='home')m.innerHTML=renderHome();
  else if(VIEW==='plan')m.innerHTML=renderPlan();
  else if(VIEW==='quiz')m.innerHTML=renderQuiz();
  else if(VIEW==='study')m.innerHTML=renderStudy();
  else if(VIEW==='house')m.innerHTML=renderHouse();
  else if(VIEW==='meidai')m.innerHTML=renderMeidai();
  else if(VIEW==='furya')m.innerHTML=renderFurya();
  else if(VIEW==='exams')m.innerHTML=renderExams();
  else m.innerHTML=renderSubject(VIEW);
}

/* ---------- アカウントゲート（名前入力／切替） ---------- */
function meidaiLogoSVG(){return meidaiSVG(3);}
function showGate(mode){ // mode: 'first' | 'switch'
  const accts=loadAccounts();
  const g=document.getElementById('gate');
  const list=accts.length?`
    <div class="gate-cap">アカウントをえらぶ</div>
    <div class="gate-accts">
      ${accts.map(a=>`<div class="gate-acct ${a.id===currentAccountId()?'cur':''}">
        <div class="ga-av" onclick="switchAccount('${a.id}')">${(a.name[0]||'?').toUpperCase()}</div>
        <div style="flex:1;min-width:0" onclick="switchAccount('${a.id}')"><div class="ga-nm">${a.name}</div><div class="ga-meta">${a.id===currentAccountId()?'ログイン中 ・ ':''}${a.created} 作成</div></div>
        <button class="ga-del" title="このアカウントを削除" onclick="if(confirm('「${a.name}」の記録を削除しますか？'))deleteAccount('${a.id}')">🗑</button>
      </div>`).join('')}
    </div>
    <div class="gate-or">— または 新しく作る —</div>`:'';
  g.innerHTML=`<div class="gate-card">
    <div class="gate-logo">${meidaiLogoSVG()}</div>
    <div class="gate-title">メェだい院試トラッカー</div>
    <div class="gate-sub">${accts.length?'アカウントを選ぶか、新しい名前ではじめよう。記録は名前ごとに別々に保存されるメェ。':'まずはお名前を入れて、自分専用の学習記録をはじめよう。<br>このリンクを開いた人は、それぞれ自分のアカウントを作れるメェ🐐'}</div>
    ${list}
    <div class="gate-form">
      <input id="gateName" class="gate-input" placeholder="お名前（例：だいち）" maxlength="16" onkeydown="if(event.key==='Enter')gateCreate()"/>
      <button class="btn btn-p" onclick="gateCreate()">はじめる</button>
    </div>
    ${mode==='switch'&&currentAccount()?`<button class="gate-cancel" onclick="hideGate()">キャンセル</button>`:''}
  </div>`;
  g.classList.remove('hidden');
  setTimeout(()=>{const i=document.getElementById('gateName');if(i)i.focus();},50);
}
function gateCreate(){
  const el=document.getElementById('gateName');const v=(el.value||'').trim();
  if(!v){el.focus();el.style.borderColor='var(--hi)';return;}
  createAccount(v);hideGate();boot();
}
function hideGate(){document.getElementById('gate').classList.add('hidden');}

/* ---------- 起動 ---------- */
function boot(){
  if(!currentAccount()){showGate('first');return;}
  hideGate();
  S=loadState();
  checkEvolution();
  render();
}
document.querySelectorAll('[data-view]').forEach(el=>el.addEventListener('click',()=>switchView(el.dataset.view)));
boot();
</script>
